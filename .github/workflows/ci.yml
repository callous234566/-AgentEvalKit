name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lightweight-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONUNBUFFERED: "1"
      LLM_API_KEY: "test-placeholder"
      LLM_API_BASE: "https://example.invalid/v1"
      TAVILY_API_KEY: ""
      API_TOKEN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile key modules
        run: |
          python -m py_compile \
            main.py \
            config.py \
            streamlit_app.py \
            eval/rag_eval.py \
            eval/agent_eval.py \
            rag/agent.py \
            rag/tools.py \
            rag/qa_chain.py \
            rag/vector_store.py

      - name: Validate eval case JSON
        run: |
          python -m json.tool eval/eval_cases.json > /dev/null
          python -m json.tool eval/agent_eval_cases.json > /dev/null

      - name: Run lightweight tests
        run: |
          python -m pytest \
            tests/test_maintenance_smoke.py \
            tests/test_api_client.py \
            tests/test_eval.py \
            tests/test_agent_eval.py \
            tests/test_tools_tavily.py \
            tests/test_frontend_ui_contracts.py \
            -q

      - name: Release hygiene check
        run: |
          python scripts/check_backend_release.py --no-health
